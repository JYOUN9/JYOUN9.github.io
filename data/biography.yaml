body:
  - I am a Master's student in the Department of Electrical Engineering and Computer Science at **DGIST**, currently conducting research at the **Intelligent Systems and Learning (ISL) Lab**.
  - My research primarily focuses on Hand Pose Forecasting, Hand Motion Generation, and Dexterous Hand Manipulation. I am deeply interested in developing Multimodal A.I. and Physical A.I. frameworks that seamlessly connect visual perception with robotic action.
  - Recently, my research on a multimodal foundation model for egocentric hand pose forecasting was accepted to **CVPR 2026 Findings**.
